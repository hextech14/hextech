backend:
  name: github
  repo: hextech14/hextech
  branch: main
  # Временно удаляем base_url, пока не настроим новый прокси
  # base_url: https://your-oauth-service.onrender.com

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "posts"
    label: "Посты"
    folder: "_posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Заголовок", name: "title", widget: "string" }
      - { label: "Текст поста", name: "body", widget: "markdown" }
