backend:
  name: github
  repo: hextech14/hextech
  branch: main
  # ЭТО ГЛАВНОЕ: указываем публичный сервер для авторизации
  base_url: https://auth.decapcms.org
  auth_endpoint: /auth/github

# Остальные настройки остаются без изменений
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "posts"
    label: "Посты"
    folder: "_posts"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Заголовок", name: "title", widget: "string"}
      - {label: "Текст поста", name: "body", widget: "markdown"}
