backend:
  name: github
  repo: hextech14/hextech   # название вашего репозитория
  branch: main
  auth_type: pkce           # Самый надежный метод аутентификации на сегодня

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "posts"
    label: "Посты"
    folder: "_posts"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Заголовок", name: "title", widget: "string"}
      - {label: "Текст поста", name: "body", widget: "markdown"}
