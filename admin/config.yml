backend:
  name: github
  repo: hextech14/hextech
  branch: main
  # ВАЖНО: явно указываем использовать GitHub OAuth
  auth_type: pkce
  # НЕ используем base_url и auth_endpoint — они не нужны

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "posts"
    label: "Посты"
    folder: "_posts"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Заголовок", name: "title", widget: "string"}
      - {label: "Текст поста", name: "body", widget: "markdown"}
