<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Админка (тест)</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Отключаем проверку пароля для теста
    window.CMS_CONFIG = {
      backend: {
        name: "github",
        repo: "hextech14/hextech",
        branch: "main"
      },
      media_folder: "images/uploads",
      public_folder: "/images/uploads",
      collections: [
        {
          name: "posts",
          label: "Посты",
          folder: "_posts",
          create: true,
          slug: "{{slug}}",
          fields: [
            { label: "Заголовок", name: "title", widget: "string" },
            { label: "Текст", name: "body", widget: "markdown" }
          ]
        }
      ]
    };
  </script>
</body>
</html>
